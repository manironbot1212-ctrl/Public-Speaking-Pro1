<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Executive Tech Interview - 10 Stage Evaluation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            touch-action: none; 
            background-color: #000;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #gui {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            touch-action: none;
        }
        #joystick-stick {
            position: absolute;
            top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: rgba(212, 175, 55, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .action-btn {
            position: absolute;
            width: 75px; height: 75px;
            border-radius: 50%;
            pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; color: white;
            border: 2px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            touch-action: none;
        }
        #btn-a { bottom: 130px; right: 40px; background: rgba(0, 204, 255, 0.6); }
        #btn-b { bottom: 40px; right: 130px; background: rgba(255, 50, 50, 0.6); }

        #overlay-msg {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(40, 30, 20, 0.85); color: #fdf6e3;
            padding: 10px 20px; border-radius: 8px;
            pointer-events: none; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px;
            z-index: 101;
        }
    </style>
    <script>
        window.joystickData = { x: 0, y: 0 };

        AFRAME.registerComponent('joystick-move', {
            schema: { speed: { default: 0.12 } },
            init: function() {
                this.direction = new THREE.Vector3();
                this.camDir = new THREE.Vector3();
            },
            tick: function (time, delta) {
                if (window.joystickData.x === 0 && window.joystickData.y === 0) return;

                const camera = this.el.querySelector('a-camera');
                const rig = this.el;
                
                camera.object3D.getWorldDirection(this.camDir);
                this.camDir.y = 0; 
                this.camDir.normalize();

                const strafeDir = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), this.camDir).normalize();

                const moveForward = -window.joystickData.y;
                const moveStrafe = -window.joystickData.x;

                const pos = rig.getAttribute('position');
                const frameSpeed = this.data.speed * (delta / 16); 

                pos.x += (this.camDir.x * moveForward + strafeDir.x * moveStrafe) * frameSpeed;
                pos.z += (this.camDir.z * moveForward + strafeDir.z * moveStrafe) * frameSpeed;
                
                rig.setAttribute('position', pos);
            }
        });
    </script>
</head>
<body>

    <div id="overlay-msg">Joystick: Move | A: Select | B: Reset</div>

    <div id="gui">
        <div id="joystick-zone"><div id="joystick-stick"></div></div>
        <div id="btn-a" class="action-btn">A</div>
        <div id="btn-b" class="action-btn">B</div>
    </div>

    <a-scene cursor="rayOrigin: mouse" 
             raycaster="objects: .clickable" 
             renderer="antialias: true; colorManagement: true;">
        
        <a-entity id="environment">
            <a-plane position="0 0 0" rotation="-90 0 0" width="40" depth="40" color="#2b1d0e" material="roughness: 0.4"></a-plane>
            <a-box position="0 4.5 0" width="20" height="0.2" depth="20" color="#f5f5f5"></a-box>
            <a-plane position="0 2.25 -10" width="20" height="4.5" color="#2f3e30"></a-plane> 
            <a-plane position="-10 2.25 0" rotation="0 90 0" width="20" height="4.5" color="#3a3a3a"></a-plane>
            <a-plane position="10 2.25 0" rotation="0 -90 0" width="20" height="4.5" color="#3a3a3a"></a-plane>
        </a-entity>

        <a-entity light="type: ambient; color: #ffe6cc; intensity: 0.6"></a-entity>
        <a-entity light="type: directional; intensity: 0.5; castShadow: true" position="-1 4 2"></a-entity>
        
        <a-entity position="0 0 -3">
            <a-box width="4" height="0.1" depth="2" position="0 0.85 0" color="#1a0f05"></a-box>
            <a-box width="0.7" height="0.02" depth="0.5" position="1.2 0.86 0.2" rotation="0 -15 0" color="#222">
                <a-plane width="0.65" height="0.45" position="0 0.01 0.25" rotation="-110 0 0" color="#000" material="emissive: #00f; emissiveIntensity: 0.2"></a-plane>
            </a-box>
        </a-entity>
        
        <a-entity id="interviewer" position="0 0 -5">
            <a-cylinder position="0 0.8 0" radius="0.4" height="1.6" color="#111"></a-cylinder> 
            <a-sphere position="0 1.9 0" radius="0.28" color="#f3c2a8"></a-sphere>
            
            <a-entity id="clipboard" position="0 1.6 2.5" rotation="-15 0 0">
                <a-box width="2.4" height="3.2" depth="0.08" color="#3d2b1f">
                    <a-plane position="0 0 0.05" width="2.2" height="3.0" color="#fff9f0">
                        <a-text id="q-text" value="Please focus on the screen." color="#1a0f05" align="center" width="2.0" position="0 1.2 0.01" wrap-count="20"></a-text>
                        <a-entity id="options-container" position="0 0.25 0.01"></a-entity>
                        <a-text id="progress-text" value="Interview Loading..." color="#888" align="center" width="1.4" position="0 -1.35 0.01"></a-text>
                    </a-plane>
                </a-box>
            </a-entity>
        </a-entity>

        <a-entity id="rig" position="0 0 2" joystick-move>
            <a-camera id="main-cam" look-controls="pointerLockEnabled: false">
                <a-entity cursor="fuse: false" 
                          raycaster="objects: .clickable"
                          position="0 0 -1" 
                          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.018" 
                          material="color: #d4af37; shader: flat; opacity: 0.8">
                </a-entity>
            </a-camera>
        </a-entity>

        <a-entity id="results-screen" position="0 2 -3" visible="false">
            <a-plane width="4" height="2.5" color="#1a0f05" material="opacity: 0.9">
                <a-text id="final-score" value="" align="center" width="3.5" position="0 0.2 0.1" color="#d4af37"></a-text>
                <a-box position="0 -0.7 0.2" width="1.5" height="0.4" color="#2f3e30" class="clickable" id="restart-btn">
                    <a-text value="RESTART" align="center" width="3" position="0 0 0.06"></a-text>
                </a-box>
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        const zone = document.getElementById('joystick-zone');
        const stick = document.getElementById('joystick-stick');
        let active = false;
        let rect = zone.getBoundingClientRect();

        const updateRect = () => { rect = zone.getBoundingClientRect(); };
        window.addEventListener('resize', updateRect);

        const handleMove = (e) => {
            if (!active) return;
            if (e.cancelable) e.preventDefault();
            
            // FIXED: Correctly access the first touch object from the touches list
            const touch = (e.touches && e.touches.length > 0) ? e.touches : e;
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = 50;

            if (dist > max) {
                dx *= max / dist;
                dy *= max / dist;
            }

            stick.style.left = (50 + (dx / rect.width) * 100) + '%';
            stick.style.top = (50 + (dy / rect.height) * 100) + '%';
            
            window.joystickData.x = dx / max;
            window.joystickData.y = dy / max;
        };

        zone.addEventListener('touchstart', (e) => { active = true; updateRect(); handleMove(e); }, {passive: false});
        zone.addEventListener('mousedown', (e) => { active = true; updateRect(); handleMove(e); });

        const resetJoystick = () => {
            active = false;
            stick.style.left = '50%';
            stick.style.top = '50%';
            window.joystickData = { x: 0, y: 0 };
        };

        window.addEventListener('touchend', resetJoystick);
        window.addEventListener('mouseup', resetJoystick);
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('mousemove', handleMove);

        const btnA = document.getElementById('btn-a');
        const triggerA = (e) => {
            if (e.cancelable) e.preventDefault();
            const camera = document.getElementById('main-cam');
            const raycasterComp = camera.components.raycaster;
            
            // FIXED: access intersections properly to prevent script crash and page reset
            if (raycasterComp && raycasterComp.intersections && raycasterComp.intersections.length > 0) {
                const intersect = raycasterComp.intersections;
                if (intersect.object && intersect.object.el && intersect.object.el.classList.contains('clickable')) {
                    intersect.object.el.emit('click');
                }
            }
        };
        btnA.addEventListener('touchstart', triggerA, {passive: false});
        btnA.addEventListener('mousedown', triggerA);

        document.getElementById('btn-b').addEventListener('click', () => location.reload());

        const bank = [
            { q: "1. Which keyword defines a block-scoped variable?", o: ["var", "let", "global", "static"], a: 1 },
            { q: "2. What is the default value of a boolean in JS?", o: ["true", "false", "undefined", "null"], a: 1 },
            { q: "3. Which React hook handles side effects?", o: ["useState", "useContext", "useEffect", "useMemo"], a: 2 },
            { q: "4. What does CSS stand for?", o: ["Creative Style Sheets", "Cascading Style Sheets", "Color Style Sheets", "Computer Style Sheets"], a: 1 },
            { q: "5. Which HTML tag is used for the largest heading?", o: ["<head>", "<h6>", "<h1>", "<heading>"], a: 2 },
            { q: "6. How do you select an ID in CSS?", o: [".name", "#name", "*name", "@name"], a: 1 },
            { q: "7. Which company developed React?", o: ["Google", "Twitter", "Facebook", "Microsoft"], a: 2 },
            { q: "8. What is 'NaN' in JavaScript?", o: ["Not a Number", "New and Now", "Name and Node", "Nothing at Night"], a: 0 },
            { q: "9. Which array method adds to the end?", o: ["pop()", "shift()", "push()", "unshift()"], a: 2 },
            { q: "10. What is 2 + '2' in JavaScript?", o: ["4", "'22'", "NaN", "Error"], a: 1 }
        ];

        let index = 0;
        let score = 0;
        let lockInput = false;

        function updateUI() {
            lockInput = false;
            if (index >= bank.length) {
                document.getElementById('clipboard').setAttribute('visible', 'false');
                document.getElementById('results-screen').setAttribute('visible', 'true');
                const grade = score >= 7 ? "HIRED" : "NOT HIRED";
                document.getElementById('final-score').setAttribute('value', `INTERVIEW COMPLETE\n\nSCORE: ${score} / 10\nSTATUS: ${grade}`);
                document.getElementById('restart-btn').addEventListener('click', () => location.reload());
                return;
            }

            const data = bank[index];
            document.getElementById('q-text').setAttribute('value', data.q);
            document.getElementById('progress-text').setAttribute('value', `Question ${index + 1} of 10`);
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";

            data.o.forEach((opt, i) => {
                const el = document.createElement('a-entity');
                // FIXED: Adjusted Y positions to ensure 3rd and 4th options fit perfectly
                el.setAttribute('position', `0 ${0.5 - (i * 0.45)} 0`);
                
                const bg = document.createElement('a-plane');
                bg.setAttribute('width', '2.0');
                bg.setAttribute('height', '0.38');
                bg.setAttribute('color', '#eee');
                bg.setAttribute('class', 'clickable');
                
                bg.addEventListener('mouseenter', () => bg.setAttribute('color', '#d4af37'));
                bg.addEventListener('mouseleave', () => bg.setAttribute('color', '#eee'));
                
                el.addEventListener('click', (e) => {
                    if (lockInput) return;
                    lockInput = true;
                    if (i === data.a) score++;
                    index++;
                    setTimeout(updateUI, 150);
                });

                const txt = document.createElement('a-text');
                txt.setAttribute('value', opt);
                txt.setAttribute('color', '#1a0f05');
                txt.setAttribute('align', 'center');
                txt.setAttribute('width', '1.8');
                txt.setAttribute('position', '0 0 0.01');

                el.appendChild(bg);
                el.appendChild(txt);
                container.appendChild(el);
            });
        }

        window.onload = updateUI;
    </script>
</body>
</html>
