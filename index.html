<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxury Executive Suite - Pro Edition</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* GUI Overlay for Joystick and Buttons */
        #gui {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        /* Virtual Joystick (X/Y) */
        #joystick-zone {
            position: absolute;
            bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        #joystick-stick {
            position: absolute;
            top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: rgba(212, 175, 55, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Action Buttons (A/B) */
        .action-btn {
            position: absolute;
            width: 70px; height: 70px;
            border-radius: 50%;
            pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; color: white;
            border: 2px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            user-select: none;
        }
        #btn-a { bottom: 120px; right: 40px; background: rgba(0, 204, 255, 0.5); }
        #btn-b { bottom: 40px; right: 120px; background: rgba(255, 50, 50, 0.5); }

        #overlay-msg {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(40, 30, 20, 0.85); color: #fdf6e3;
            padding: 10px 20px; border-radius: 8px;
            pointer-events: none; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
    <script>
        // Global state for X/Y movement
        window.joystickData = { x: 0, y: 0 };

        AFRAME.registerComponent('joystick-move', {
            schema: { speed: { default: 0.08 } },
            tick: function (time, delta) {
                if (window.joystickData.x === 0 && window.joystickData.y === 0) return;

                const camera = document.querySelector('a-camera');
                const rig = this.el;
                
                // Get forward direction from camera rotation
                const rotation = camera.getAttribute('rotation');
                const angle = (rotation.y * Math.PI) / 180;

                // X/Y movement calculation based on rotation
                const moveX = window.joystickData.x * Math.cos(angle) + window.joystickData.y * Math.sin(angle);
                const moveZ = window.joystickData.x * Math.sin(angle) - window.joystickData.y * Math.cos(angle);

                const pos = rig.getAttribute('position');
                pos.x += moveX * this.data.speed;
                pos.z += moveZ * this.data.speed;
                rig.setAttribute('position', pos);
            }
        });
    </script>
</head>
<body>

    <div id="overlay-msg">Joystick to move | A: Select | B: Reset</div>

    <!-- UI LAYER -->
    <div id="gui">
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
        <div id="btn-a" class="action-btn">A</div>
        <div id="btn-b" class="action-btn">B</div>
    </div>

    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable" shadow="type: pcfsoft">
        
        <!-- LUXURY ARCHITECTURE -->
        <a-entity id="room">
            <a-plane position="0 0 0" rotation="-90 0 0" width="20" depth="20" color="#2b1d0e" material="roughness: 0.3"></a-plane>
            <a-box position="0 4.5 0" width="12" height="0.2" depth="12" color="#f5f5f5"></a-box>
            <a-box position="0 4.4 0" width="8" height="0.3" depth="8" color="#ffffff" material="emissive: #ffccaa; emissiveIntensity: 0.15"></a-box>
            <a-plane position="0 2.25 -6" width="12" height="4.5" color="#2f3e30"></a-plane> 
            <a-plane position="-6 2.25 0" rotation="0 90 0" width="12" height="4.5" color="#3a3a3a"></a-plane>
            <a-plane position="6 2.25 0" rotation="0 -90 0" width="12" height="4.5" color="#3a3a3a"></a-plane>
            <a-box position="0 0.1 -5.95" width="12" height="0.2" depth="0.1" color="#1a0f05"></a-box>
        </a-entity>

        <!-- DECORATIONS -->
        <a-entity position="-4 2 -5.8">
            <a-box width="3" height="0.05" depth="0.4" color="#1a0f05" position="0 0.8 0"></a-box>
            <a-box width="3" height="0.05" depth="0.4" color="#1a0f05" position="0 0.2 0"></a-box>
            <a-box width="0.1" height="0.4" depth="0.3" color="#800" position="-1 1.05 0"></a-box>
            <a-box width="0.12" height="0.38" depth="0.3" color="#040" position="-0.7 1.05 0"></a-box>
        </a-entity>

        <a-entity position="3 2.5 -5.9">
            <a-box width="2" height="1.5" depth="0.05" color="#111"></a-box>
            <a-plane position="0 0 0.03" width="1.8" height="1.3" color="#eee"></a-plane>
        </a-entity>

        <!-- LIGHTING -->
        <a-entity light="type: ambient; color: #ffe6cc; intensity: 0.5"></a-entity>
        <a-entity light="type: point; intensity: 0.7; distance: 12; color: #fff4e6" position="0 3.5 -1"></a-entity>
        
        <!-- DESK -->
        <a-entity position="0 0 -1.8">
            <a-box width="3.5" height="0.1" depth="1.5" position="0 0.85 0" color="#1a0f05"></a-box>
            <a-box width="0.6" height="0.02" depth="0.4" position="1 0.86 0.1" rotation="0 -20 0" color="#222">
                <a-plane width="0.55" height="0.35" position="0 0.01 0.2" rotation="-110 0 0" color="#000" material="emissive: #0088ff; emissiveIntensity: 0.3"></a-plane>
            </a-box>
        </a-entity>
        
        <!-- INTERVIEWER -->
        <a-entity id="interviewer" position="0 0 -3">
            <a-cylinder position="0 0.8 0" radius="0.35" height="1.6" color="#1a1a1a"></a-cylinder> 
            <a-sphere position="0 1.8 0" radius="0.25" color="#f3c2a8"></a-sphere>
            
            <a-entity id="clipboard" position="0.6 1.4 1.1" rotation="-15 -25 0">
                <a-box width="1" height="1.3" depth="0.04" color="#3d2b1f">
                    <a-plane position="0 0 0.03" width="0.9" height="1.2" color="#fff9f0">
                        <a-text id="q-text" value="Welcome. Let us begin." color="#2b1d0e" align="center" width="0.8" position="0 0.45 0.01"></a-text>
                        <a-entity id="options-container" position="0 0.05 0.01"></a-entity>
                    </a-plane>
                </a-box>
            </a-entity>
        </a-entity>

        <a-entity id="rig" position="0 0 1.5" joystick-move>
            <a-camera look-controls="pointerLockEnabled: false"></a-camera>
        </a-entity>

        <a-entity id="results-screen" position="0 2 -1.5" visible="false">
            <a-plane width="3" height="2" color="#2b1d0e" material="opacity: 0.95">
                <a-text id="final-score" value="" align="center" width="2.5" position="0 0.3 0.1" color="#fdf6e3"></a-text>
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        // JOYSTICK LOGIC
        const zone = document.getElementById('joystick-zone');
        const stick = document.getElementById('joystick-stick');
        let active = false;

        zone.addEventListener('touchstart', (e) => active = true);
        zone.addEventListener('touchend', () => {
            active = false;
            stick.style.left = '50%';
            stick.style.top = '50%';
            window.joystickData = { x: 0, y: 0 };
        });

        zone.addEventListener('touchmove', (e) => {
            if (!active) return;
            const touch = e.touches;
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = 50;

            if (dist > max) {
                dx *= max / dist;
                dy *= max / dist;
            }

            stick.style.left = (50 + (dx / rect.width) * 100) + '%';
            stick.style.top = (50 + (dy / rect.height) * 100) + '%';
            
            window.joystickData.x = dx / max;
            window.joystickData.y = dy / max;
        });

        // A/B BUTTON LOGIC
        document.getElementById('btn-a').addEventListener('touchstart', () => {
            // "A" mimics a click on the scene center for answering questions
            const raycaster = document.querySelector('[raycaster]').components.raycaster;
            const intersection = raycaster.intersections;
            if (intersection && intersection.object.el.classList.contains('clickable')) {
                intersection.object.el.click();
            }
        });

        document.getElementById('btn-b').addEventListener('touchstart', () => {
            location.reload(); // Reset the experience
        });

        // INTERVIEW LOGIC
        const bank = [
            { q: "Scope of 'const' in JS?", o: ["Global only", "Block scope", "Function only", "None"], a: 1 },
            { q: "React state hook?", o: ["useEffect", "useMemo", "useState", "useRef"], a: 2 },
            { q: "CSS Flex center items?", o: ["align-items", "justify-content", "padding", "margin"], a: 1 },
            { q: "HTML Nav tag?", o: ["<nav>", "<div>", "<section>", "<header>"], a: 0 }
        ];

        let index = 0;
        let score = 0;

        function updateUI() {
            if (index >= bank.length) {
                document.getElementById('clipboard').setAttribute('visible', 'false');
                document.getElementById('results-screen').setAttribute('visible', 'true');
                document.getElementById('final-score').setAttribute('value', `SCORE: ${score}/${bank.length}`);
                return;
            }
            const data = bank[index];
            document.getElementById('q-text').setAttribute('value', data.q);
            const container = document.getElementById('options-container');
            container.innerHTML = "";

            data.o.forEach((opt, i) => {
                const el = document.createElement('a-entity');
                el.setAttribute('position', `0 ${0.15 - (i * 0.2)} 0`);
                const bg = document.createElement('a-plane');
                bg.setAttribute('width', '0.8'); bg.setAttribute('height', '0.15');
                bg.setAttribute('color', '#fdf6e3'); bg.setAttribute('class', 'clickable');
                bg.onclick = () => { if(i === data.a) score++; index++; updateUI(); };
                const txt = document.createElement('a-text');
                txt.setAttribute('value', opt); txt.setAttribute('color', '#2b1d0e');
                txt.setAttribute('align', 'center'); txt.setAttribute('width', '0.7');
                el.appendChild(bg); el.appendChild(txt);
                container.appendChild(el);
            });
        }
        window.onload = updateUI;
    </script>
</body>
</html>
